name: Build & Deploy Angular to GitHub Pages

on:

  workflow_dispatch:

permissions:
  contents: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: |
          npm run build ggc-home -- --configuration production \
            --base-href /generieke-geo-componenten/

      - name: Deploy to GitHub Pages branch_build
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: dist/ggc-home/browser
          force_orphan: true
